name: Build installable debug APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to attach the APK to
        required: false
        default: v0.1.1
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle testDebugUnitTest assembleDebug --stacktrace

      - name: Prepare APK file
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/company-car-log-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: company-car-log-debug-apk
          path: dist/company-car-log-debug.apk
          retention-days: 30

      - name: Attach APK to requested release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" dist/company-car-log-debug.apk --clobber
